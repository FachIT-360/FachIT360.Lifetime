name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and pack
    runs-on:
      - self-hosted
      - Linux
      - X64
      - homelab

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
            
      - name: Print runner information
        run: |
          echo "Runner name: $RUNNER_NAME"
          echo "Runner OS: $RUNNER_OS"
          echo "Runner architecture: $RUNNER_ARCH"
          dotnet --info

      - name: Restore
        run: dotnet restore src/FachIT360.Lifetime.Blazor/FachIT360.Lifetime.Blazor.csproj

      - name: Build
        run: dotnet build src/FachIT360.Lifetime.Blazor/FachIT360.Lifetime.Blazor.csproj --configuration Release --no-restore

      - name: Pack core package
        run: dotnet pack src/FachIT360.Lifetime/FachIT360.Lifetime.csproj --configuration Release --no-build --output artifacts/packages

      - name: Pack Blazor package
        run: dotnet pack src/FachIT360.Lifetime.Blazor/FachIT360.Lifetime.Blazor.csproj --configuration Release --no-build --output artifacts/packages

      - name: Configure GitHub NuGet source
        run: dotnet nuget add source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
          --name github \
          --username "github" \
          --password ${GITHUB_TOKEN} \
          --store-password-in-clear-text \
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Push packages to GitHub NuGet Feed
        run: |
          for package in artifacts/packages/*.nupkg; do
            echo "Pushing package: $package"
            dotnet nuget push "$package" \
              --source github \
              --api-key ${GITHUB_TOKEN} \
              --skip-duplicate
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}